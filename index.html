<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artale Snowflake Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2e3147;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      color: #7eb8f7;
      flex-shrink: 0;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left: preview + region select ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      min-width: 0;
      border-right: 1px solid #2e3147;
    }

    .preview-label {
      font-size: 12px;
      color: #556677;
      flex-shrink: 0;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      background: #06070d;
      border: 1px solid #2e3147;
      border-radius: 6px;
      overflow: hidden;
      cursor: crosshair;
    }

    #previewCanvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Drag selection overlay drawn on canvas — no separate div needed */

    /* ── Right: controls + list ── */
    .control-panel {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }

    .buttons { display: flex; gap: 8px; }

    button {
      flex: 1;
      padding: 9px 4px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: filter .15s, opacity .15s;
    }
    button:disabled { opacity: .4; cursor: default; }
    button:not(:disabled):hover  { filter: brightness(1.15); }
    button:not(:disabled):active { filter: brightness(.85); }

    #captureBtn { background: #3a5fa0; color: #fff; }
    #toggleBtn  { background: #2e7d4f; color: #fff; }
    #toggleBtn.stop { background: #8b2020; }
    #clearBtn   { background: #3a3f55; color: #ccc; }

    .progress-bar {
      height: 2px;
      background: #2e3147;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7eb8f7, #3dcc7a);
      transition: width .3s;
    }

    .status-bar {
      background: #12141e;
      border: 1px solid #2e3147;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #8899aa;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #445566; flex-shrink: 0; }
    .dot.green  { background: #3dcc7a; box-shadow: 0 0 6px #3dcc7a88; }
    .dot.yellow { background: #f0c040; }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #8899aa;
      flex-shrink: 0;
    }
    #countBadge {
      background: #2e3147;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 12px;
      color: #aabbcc;
    }

    .list-container {
      flex: 1;
      overflow-y: auto;
      background: #12141e;
      border: 1px solid #2e3147;
      border-radius: 6px;
    }
    .list-container::-webkit-scrollbar { width: 5px; }
    .list-container::-webkit-scrollbar-thumb { background: #2e3147; border-radius: 3px; }

    .name-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid #1e2030;
      animation: fadeIn .25s ease;
    }
    .name-item:last-child { border-bottom: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item-idx  { font-size: 11px; color: #445566; width: 22px; text-align: right; flex-shrink: 0; }
    .item-name { flex: 1; font-size: 14px; color: #ddeeff; }
    .item-time { font-size: 11px; color: #445566; flex-shrink: 0; }

    .empty-hint { text-align: center; color: #334455; font-size: 13px; padding: 30px 10px; }
  </style>
</head>
<body>

<header>❄️ Artale 雪花施放追蹤器</header>

<div class="main">

  <!-- Left: live preview + drag-to-select -->
  <div class="preview-panel">
    <div class="preview-label" id="previewLabel">選擇畫面後，在預覽上拖曳框選雪花文字出現的位置</div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>

  <!-- Right: controls + name list -->
  <div class="control-panel">

    <div class="buttons">
      <button id="captureBtn">選擇畫面</button>
      <button id="toggleBtn" disabled>開始</button>
      <button id="clearBtn">清除</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="status-bar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">點選「選擇畫面」</span>
    </div>

    <div class="list-header">
      <span>施放名單</span>
      <span id="countBadge">0 筆</span>
    </div>

    <div class="list-container" id="nameList">
      <div class="empty-hint">尚無紀錄</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let stream     = null;
let worker     = null;
let isRunning  = false;
let ocrBusy    = false;
let motionTimer = null;

const videoEl     = document.createElement('video');
const recentNames = new Map();
const items       = [];

// Selected region in actual video coordinates { x, y, w, h }
let region = null;

// ── DOM ────────────────────────────────────────────────────────────────────────
const previewCanvas = document.getElementById('previewCanvas');
const pCtx          = previewCanvas.getContext('2d');
const canvasWrap    = document.getElementById('canvasWrap');
const captureBtn    = document.getElementById('captureBtn');
const toggleBtn     = document.getElementById('toggleBtn');
const clearBtn      = document.getElementById('clearBtn');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');
const nameList      = document.getElementById('nameList');
const countBadge    = document.getElementById('countBadge');
const progressFill  = document.getElementById('progressFill');
const previewLabel  = document.getElementById('previewLabel');

// ── Capture window ─────────────────────────────────────────────────────────────
captureBtn.addEventListener('click', async () => {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());

    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 5, cursor: 'never' },
      audio: false
    });

    videoEl.srcObject = stream;
    videoEl.onloadedmetadata = () => {
      videoEl.play();
      region = null;
      prevSample = null;
      setStatus('yellow', '請在左側預覽拖曳框選區域');
      previewLabel.textContent = '拖曳框選雪花訊息出現的位置，再按「開始」';
      drawPreviewLoop();
    };

    stream.getVideoTracks()[0].addEventListener('ended', () => {
      stopTracking();
      toggleBtn.disabled = true;
      setStatus('', '畫面擷取已停止');
    });

  } catch (_) {
    setStatus('', '已取消或不支援螢幕擷取');
  }
});

// ── Preview draw loop ──────────────────────────────────────────────────────────
function drawPreviewLoop() {
  if (!stream) return;

  // Match canvas pixel size to its display size
  const w = canvasWrap.clientWidth  || 640;
  const h = canvasWrap.clientHeight || 360;
  previewCanvas.width  = w;
  previewCanvas.height = h;

  pCtx.drawImage(videoEl, 0, 0, w, h);

  // Draw selected region overlay
  if (region) {
    const f  = scaleFactor();
    const px = region.x * f.sx;
    const py = region.y * f.sy;
    const pw = region.w * f.sx;
    const ph = region.h * f.sy;

    pCtx.strokeStyle = '#7eb8f7';
    pCtx.lineWidth   = 2;
    pCtx.setLineDash([6, 3]);
    pCtx.strokeRect(px, py, pw, ph);
    pCtx.setLineDash([]);
    pCtx.fillStyle = 'rgba(126,184,247,0.12)';
    pCtx.fillRect(px, py, pw, ph);
  }

  requestAnimationFrame(drawPreviewLoop);
}

// Scale factor: preview canvas pixel ↔ actual video pixel (stretched 1:1, no letterbox)
function scaleFactor() {
  const vw = videoEl.videoWidth  || 1;
  const vh = videoEl.videoHeight || 1;
  const cw = previewCanvas.width  || 1;
  const ch = previewCanvas.height || 1;
  return {
    sx: cw / vw,
    sy: ch / vh,
    toVideoX: px => px * vw / cw,
    toVideoY: py => py * vh / ch,
  };
}

// ── Region drag select ─────────────────────────────────────────────────────────
let drag = null; // { startX, startY }

previewCanvas.addEventListener('mousedown', e => {
  if (!stream) return;
  const rect = previewCanvas.getBoundingClientRect();
  drag = {
    startX: e.clientX - rect.left,
    startY: e.clientY - rect.top,
  };
});

previewCanvas.addEventListener('mousemove', e => {
  if (!drag || !stream) return;
  const rect = previewCanvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  // Show live drag rect on canvas (will be redrawn by preview loop)
  const f = scaleFactor();
  const x1 = Math.min(drag.startX, cx);
  const y1 = Math.min(drag.startY, cy);
  const x2 = Math.max(drag.startX, cx);
  const y2 = Math.max(drag.startY, cy);

  // Temporarily store as preview coords; converted on mouseup
  region = {
    x: f.toVideoX(x1),
    y: f.toVideoY(y1),
    w: (x2 - x1) / f.sx,
    h: (y2 - y1) / f.sy,
  };
});

previewCanvas.addEventListener('mouseup', e => {
  if (!drag) return;
  drag = null;

  if (!region || region.w < 10 || region.h < 10) {
    region = null;
    setStatus('yellow', '框選太小，請重新拖曳');
    return;
  }

  // Clamp to video bounds
  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  region.x = Math.max(0, Math.min(region.x, vw));
  region.y = Math.max(0, Math.min(region.y, vh));
  region.w = Math.min(region.w, vw - region.x);
  region.h = Math.min(region.h, vh - region.y);

  toggleBtn.disabled = false;
  const rw = Math.round(region.w), rh = Math.round(region.h);
  setStatus('yellow', `已選取 ${rw}×${rh}，按「開始」追蹤`);
  previewLabel.textContent = `已選取 ${rw}×${rh} 區域（可重新拖曳調整）`;
});

// ── Start / Stop ───────────────────────────────────────────────────────────────
toggleBtn.addEventListener('click', () => {
  if (isRunning) stopTracking();
  else           startTracking();
});

async function startTracking() {
  if (!region) { setStatus('yellow', '請先在預覽上框選區域'); return; }

  setStatus('yellow', '初始化 OCR 引擎（首次需下載語言資料）…');
  toggleBtn.disabled = true;

  if (!worker) {
    worker = await Tesseract.createWorker('chi_tra+eng', 1, {
      logger: m => {
        if (m.status === 'loading tesseract core' ||
            m.status === 'loading language traineddata') {
          progressFill.style.width = Math.round((m.progress || 0) * 100) + '%';
        }
      }
    });
    await worker.setParameters({ tessedit_pageseg_mode: Tesseract.PSM.SPARSE_TEXT });
    progressFill.style.width = '0%';
  }

  isRunning = true;
  ocrBusy   = false;
  prevSample = null;
  toggleBtn.textContent = '停止';
  toggleBtn.classList.add('stop');
  toggleBtn.disabled = false;
  setStatus('green', '追蹤中…');

  startMotionPoll();
}

function stopTracking() {
  isRunning = false;
  clearTimeout(motionTimer);
  toggleBtn.textContent = '開始';
  toggleBtn.classList.remove('stop');
  setStatus('', '已停止');
}

// ── Motion poll: triggers OCR when the selected region changes visibly ─────────
let prevSample = null;

function startMotionPoll() {
  if (!isRunning) return;
  motionTimer = setTimeout(async () => {
    if (!ocrBusy && isRunning && regionChanged()) {
      ocrBusy = true;
      await runOCR();
      ocrBusy = false;
      if (isRunning) motionTimer = setTimeout(startMotionPoll, 3000); // cooldown
    } else {
      startMotionPoll();
    }
  }, 500);
}

// Off-screen canvas for OCR
const offCanvas = document.createElement('canvas');
const offCtx    = offCanvas.getContext('2d', { willReadFrequently: true });

// Check whether the selected region has changed enough to warrant OCR
function regionChanged() {
  if (!stream || !region) return false;
  const { x, y, w, h } = region;
  if (w < 1 || h < 1) return false;

  const rw = Math.round(w), rh = Math.round(h);
  offCanvas.width  = rw;
  offCanvas.height = rh;
  offCtx.drawImage(videoEl, Math.round(x), Math.round(y), rw, rh, 0, 0, rw, rh);

  const data = offCtx.getImageData(0, 0, rw, rh).data;
  const STEP = 10, THRESH = 30, MIN_RATIO = 0.04;
  const curr = [];

  for (let py = 0; py < rh; py += STEP)
    for (let px = 0; px < rw; px += STEP) {
      const i = (py * rw + px) * 4;
      curr.push(data[i], data[i + 1], data[i + 2]);
    }

  if (!prevSample || prevSample.length !== curr.length) { prevSample = curr; return true; }

  let diff = 0;
  const total = curr.length / 3;
  for (let i = 0; i < curr.length; i += 3)
    if (Math.abs(curr[i]   - prevSample[i])   > THRESH ||
        Math.abs(curr[i+1] - prevSample[i+1]) > THRESH ||
        Math.abs(curr[i+2] - prevSample[i+2]) > THRESH) diff++;

  prevSample = curr;
  return diff / total >= MIN_RATIO;
}

// ── OCR on selected region ─────────────────────────────────────────────────────
async function runOCR() {
  if (!stream || !region) return;
  const { x, y, w, h } = region;

  offCanvas.width  = Math.round(w);
  offCanvas.height = Math.round(h);
  offCtx.drawImage(videoEl, Math.round(x), Math.round(y), Math.round(w), Math.round(h),
                            0, 0, Math.round(w), Math.round(h));

  // Grayscale + contrast boost
  const id = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    const v = Math.min(255, Math.max(0, (g - 128) * 1.8 + 128));
    d[i] = d[i+1] = d[i+2] = v;
  }
  offCtx.putImageData(id, 0, 0);

  try {
    const { data: { text } } = await worker.recognize(offCanvas.toDataURL('image/png'));
    console.log(`[OCR] ${new Date().toTimeString().slice(0,8)}\n${text}`);
    parseText(text);
  } catch (err) {
    console.error('[OCR] error:', err);
  }
}

// ── Parse OCR text ─────────────────────────────────────────────────────────────
function parseText(raw) {
  // Remove spaces inserted between adjacent CJK characters by Tesseract
  let cleaned = raw;
  for (let i = 0; i < 4; i++)
    cleaned = cleaned.replace(/([\u4e00-\u9fff])\s+([\u4e00-\u9fff])/g, '$1$2');

  // Collect all CJK sequences (2+ chars) and ASCII words (4+ chars) from the result
  const candidates = new Set();

  // CJK sequences
  for (const m of cleaned.matchAll(/[\u4e00-\u9fff\u3400-\u4dbf]{2,14}/g))
    candidates.add(m[0]);

  // English-only names (4+ alphanumeric chars, e.g. "Alice", "MapleStar")
  for (const m of cleaned.matchAll(/[a-zA-Z0-9]{4,14}/g))
    candidates.add(m[0]);

  // Use the longest candidate as the name (most likely to be the full name)
  if (candidates.size === 0) return;
  const name = [...candidates].sort((a, b) => b.length - a.length)[0];

  const now = Date.now();
  if (recentNames.has(name) && now - recentNames.get(name) < 5000) return;
  recentNames.set(name, now);

  addItem(name);
}

// ── Add name to list ───────────────────────────────────────────────────────────
function addItem(name) {
  const time = new Date().toTimeString().slice(0, 8);
  items.push({ name, time });

  if (nameList.querySelector('.empty-hint')) nameList.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'name-item';
  div.innerHTML = `
    <span class="item-idx">${items.length}</span>
    <span class="item-name">${escHtml(name)}</span>
    <span class="item-time">${time}</span>
  `;
  nameList.appendChild(div);
  nameList.scrollTop = nameList.scrollHeight;
  countBadge.textContent = items.length + ' 筆';
}

// ── Clear ──────────────────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  items.length = 0;
  recentNames.clear();
  prevSample = null;
  nameList.innerHTML = '<div class="empty-hint">尚無紀錄</div>';
  countBadge.textContent = '0 筆';
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(type, msg) {
  statusDot.className = 'dot' + (type ? ' ' + type : '');
  statusText.textContent = msg;
}
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
