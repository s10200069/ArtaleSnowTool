<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artale Snowflake Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2e3147;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      color: #7eb8f7;
      flex-shrink: 0;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left: preview + region select ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      min-width: 0;
      border-right: 1px solid #2e3147;
    }

    .preview-label {
      font-size: 12px;
      color: #556677;
      flex-shrink: 0;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      background: #06070d;
      border: 1px solid #2e3147;
      border-radius: 6px;
      overflow: hidden;
      cursor: crosshair;
    }

    #previewCanvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Drag selection overlay drawn on canvas — no separate div needed */

    /* ── Right: controls + list ── */
    .control-panel {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
      transition: width .2s;
    }

    .control-panel.fullwidth {
      width: 100%;
    }

    .buttons { display: flex; gap: 8px; }

    button {
      flex: 1;
      padding: 9px 4px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: filter .15s, opacity .15s;
    }
    button:disabled { opacity: .4; cursor: default; }
    button:not(:disabled):hover  { filter: brightness(1.15); }
    button:not(:disabled):active { filter: brightness(.85); }

    #captureBtn    { background: #3a5fa0; color: #fff; }
    #toggleBtn     { background: #2e7d4f; color: #fff; }
    #toggleBtn.stop { background: #8b2020; }
    #clearBtn      { background: #3a3f55; color: #ccc; }
    #stopShareBtn      { background: #5a3a3a; color: #ccc; }
    #togglePreviewBtn  { background: #3a3f55; color: #ccc; }
    #earlyDetectBtn    { background: #4a3f20; color: #f0c040; }
    #earlyDetectBtn:not(:disabled):hover { filter: brightness(1.2); }
    #nameListBtn       { background: #2e4a3a; color: #3dcc7a; }

    /* ── Name roster modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1d27;
      border: 1px solid #2e3147;
      border-radius: 10px;
      padding: 20px;
      width: 340px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal h2 { font-size: 15px; color: #7eb8f7; }

    .modal-input-row {
      display: flex;
      gap: 8px;
    }

    .modal-input-row input {
      flex: 1;
      background: #12141e;
      border: 1px solid #2e3147;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 7px 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .modal-input-row input:focus { border-color: #7eb8f7; }

    .modal-input-row button { flex: none; padding: 7px 14px; font-size: 13px; }
    #rosterAddBtn  { background: #2e7d4f; color: #fff; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    #rosterAddBtn:hover { filter: brightness(1.15); }

    .roster-list {
      flex: 1;
      overflow-y: auto;
      background: #12141e;
      border: 1px solid #2e3147;
      border-radius: 6px;
    }
    .roster-list::-webkit-scrollbar { width: 5px; }
    .roster-list::-webkit-scrollbar-thumb { background: #2e3147; border-radius: 3px; }

    .roster-item {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      border-bottom: 1px solid #1e2030;
      gap: 8px;
    }
    .roster-item:last-child { border-bottom: none; }
    .roster-item-name { flex: 1; font-size: 13px; color: #ddeeff; }
    .roster-item-hint { font-size: 11px; color: #445566; flex-shrink: 0; }

    .roster-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .roster-btn.edit   { color: #f0c040; }
    .roster-btn.edit:hover { background: #3a3a20; }
    .roster-btn.del    { color: #cc5555; }
    .roster-btn.del:hover  { background: #3a2020; }

    .roster-empty { text-align: center; color: #334455; font-size: 13px; padding: 20px; }

    .modal-close-row { display: flex; justify-content: flex-end; }
    .modal-close-row button { background: #3a3f55; color: #ccc; border: none; border-radius: 6px; padding: 7px 18px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .modal-close-row button:hover { filter: brightness(1.15); }

    .progress-bar {
      height: 2px;
      background: #2e3147;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7eb8f7, #3dcc7a);
      transition: width .3s;
    }

    .status-bar {
      background: #12141e;
      border: 1px solid #2e3147;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #8899aa;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #445566; flex-shrink: 0; }
    .dot.green  { background: #3dcc7a; box-shadow: 0 0 6px #3dcc7a88; }
    .dot.yellow { background: #f0c040; }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #8899aa;
      flex-shrink: 0;
    }
    #countBadge {
      background: #2e3147;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 12px;
      color: #aabbcc;
    }

    .list-container {
      flex: 1;
      overflow-y: auto;
      background: #12141e;
      border: 1px solid #2e3147;
      border-radius: 6px;
    }
    .list-container::-webkit-scrollbar { width: 5px; }
    .list-container::-webkit-scrollbar-thumb { background: #2e3147; border-radius: 3px; }

    .name-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid #1e2030;
      animation: fadeIn .25s ease;
    }
    .name-item:last-child { border-bottom: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item-idx  { font-size: 11px; color: #445566; width: 22px; text-align: right; flex-shrink: 0; }
    .item-name { flex: 1; font-size: 14px; color: #ddeeff; }
    .item-time { font-size: 11px; color: #445566; flex-shrink: 0; }

    .empty-hint { text-align: center; color: #334455; font-size: 13px; padding: 30px 10px; }

    /* Snowflake ending reminder */
    #snowAlert {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #1a2a4a, #0f1117);
      border: 2px solid #7eb8f7;
      border-radius: 12px;
      padding: 24px 36px;
      text-align: center;
      z-index: 9999;
      box-shadow: 0 0 40px #7eb8f744;
      animation: pulse 1s ease-in-out infinite alternate;
    }
    #snowAlert.show { display: block; }
    #snowAlert .alert-icon { font-size: 36px; }
    #snowAlert .alert-text { font-size: 20px; font-weight: bold; color: #7eb8f7; margin-top: 8px; }
    #snowAlert .alert-sub  { font-size: 13px; color: #8899aa; margin-top: 4px; }
    #alertOkBtn {
      margin-top: 16px;
      padding: 7px 28px;
      background: #7eb8f7;
      color: #0f1117;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    #alertOkBtn:hover { filter: brightness(1.15); }

    @keyframes pulse {
      from { box-shadow: 0 0 20px #7eb8f744; }
      to   { box-shadow: 0 0 50px #7eb8f7aa; }
    }
  </style>
</head>
<body>

<header>❄️ Artale 雪花施放追蹤器</header>

<div class="main">

  <!-- Left: live preview + drag-to-select -->
  <div class="preview-panel">
    <div class="preview-label" id="previewLabel">選擇畫面後，在預覽上拖曳框選雪花文字出現的位置</div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>

  <!-- Right: controls + name list -->
  <div class="control-panel">

    <div class="buttons">
      <button id="captureBtn">選擇畫面</button>
      <button id="toggleBtn" disabled>開始</button>
      <button id="clearBtn">清除</button>
      <button id="stopShareBtn" disabled>中斷共享</button>
      <button id="togglePreviewBtn">隱藏畫面</button>
      <button id="earlyDetectBtn" disabled>提前偵測</button>
      <button id="nameListBtn">角色名單</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="status-bar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">點選「選擇畫面」</span>
      <span id="countdownText" style="margin-left:auto;font-size:12px;color:#f0c040;display:none;"></span>
    </div>

    <div class="list-header">
      <span>施放名單</span>
      <span id="countBadge">0 筆</span>
    </div>

    <div class="list-container" id="nameList">
      <div class="empty-hint">尚無紀錄</div>
    </div>

  </div>
</div>

<!-- Name roster modal -->
<div class="modal-overlay" id="rosterModal">
  <div class="modal">
    <h2>角色名單</h2>
    <div class="modal-input-row">
      <input id="rosterInput" type="text" placeholder="輸入角色名稱…" maxlength="14" />
      <button id="rosterAddBtn">新增</button>
    </div>
    <div class="roster-list" id="rosterList">
      <div class="roster-empty">尚無名稱</div>
    </div>
    <div class="modal-close-row">
      <button id="rosterCloseBtn">關閉</button>
    </div>
  </div>
</div>

<!-- Snowflake ending reminder overlay -->
<div id="snowAlert">
  <div class="alert-icon">❄️</div>
  <div class="alert-text">雪花將於10秒後消失</div>
  <button id="alertOkBtn">確定</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let stream     = null;
let worker     = null;
let isRunning  = false;
let ocrBusy    = false;
let motionTimer = null;

const videoEl     = document.createElement('video');
const recentNames = new Map();
const items       = [];

// Selected region in actual video coordinates { x, y, w, h }
let region = null;

// ── DOM ────────────────────────────────────────────────────────────────────────
const previewCanvas = document.getElementById('previewCanvas');
const pCtx          = previewCanvas.getContext('2d');
const canvasWrap    = document.getElementById('canvasWrap');
const captureBtn    = document.getElementById('captureBtn');
const toggleBtn     = document.getElementById('toggleBtn');
const clearBtn      = document.getElementById('clearBtn');
const stopShareBtn       = document.getElementById('stopShareBtn');
const togglePreviewBtn   = document.getElementById('togglePreviewBtn');
const previewPanel       = document.querySelector('.preview-panel');

const controlPanel = document.querySelector('.control-panel');

togglePreviewBtn.addEventListener('click', () => {
  const hidden = previewPanel.style.display === 'none';
  previewPanel.style.display = hidden ? '' : 'none';
  controlPanel.classList.toggle('fullwidth', !hidden);
  togglePreviewBtn.textContent = hidden ? '隱藏畫面' : '開啟畫面';
});
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');
const nameList      = document.getElementById('nameList');
const countBadge    = document.getElementById('countBadge');
const progressFill  = document.getElementById('progressFill');
const previewLabel  = document.getElementById('previewLabel');

// ── Capture window ─────────────────────────────────────────────────────────────
captureBtn.addEventListener('click', async () => {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());

    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 5, cursor: 'never' },
      audio: false
    });

    videoEl.srcObject = stream;
    videoEl.onloadedmetadata = () => {
      videoEl.play();
      region = null;
      prevSample = null;
      setStatus('yellow', '請在左側預覽拖曳框選區域');
      previewLabel.textContent = '拖曳框選雪花訊息出現的位置，再按「開始」';
      drawPreviewLoop();
    };

    stream.getVideoTracks()[0].addEventListener('ended', () => {
      stopTracking();
      toggleBtn.disabled = true;
      stopShareBtn.disabled = true;
      setStatus('', '畫面擷取已停止');
    });

    stopShareBtn.disabled = false;

  } catch (_) {
    setStatus('', '已取消或不支援螢幕擷取');
  }
});

// ── Preview draw loop ──────────────────────────────────────────────────────────
function drawPreviewLoop() {
  if (!stream) return;

  // Match canvas pixel size to its display size
  const w = canvasWrap.clientWidth  || 640;
  const h = canvasWrap.clientHeight || 360;
  previewCanvas.width  = w;
  previewCanvas.height = h;

  pCtx.drawImage(videoEl, 0, 0, w, h);

  // Draw selected region overlay
  if (region) {
    const f  = scaleFactor();
    const px = region.x * f.sx;
    const py = region.y * f.sy;
    const pw = region.w * f.sx;
    const ph = region.h * f.sy;

    pCtx.strokeStyle = '#7eb8f7';
    pCtx.lineWidth   = 2;
    pCtx.setLineDash([6, 3]);
    pCtx.strokeRect(px, py, pw, ph);
    pCtx.setLineDash([]);
    pCtx.fillStyle = 'rgba(126,184,247,0.12)';
    pCtx.fillRect(px, py, pw, ph);
  }

  requestAnimationFrame(drawPreviewLoop);
}

// Scale factor: preview canvas pixel ↔ actual video pixel (stretched 1:1, no letterbox)
function scaleFactor() {
  const vw = videoEl.videoWidth  || 1;
  const vh = videoEl.videoHeight || 1;
  const cw = previewCanvas.width  || 1;
  const ch = previewCanvas.height || 1;
  return {
    sx: cw / vw,
    sy: ch / vh,
    toVideoX: px => px * vw / cw,
    toVideoY: py => py * vh / ch,
  };
}

// ── Region drag select ─────────────────────────────────────────────────────────
let drag = null; // { startX, startY }

previewCanvas.addEventListener('mousedown', e => {
  if (!stream) return;
  const rect = previewCanvas.getBoundingClientRect();
  drag = {
    startX: e.clientX - rect.left,
    startY: e.clientY - rect.top,
  };
});

previewCanvas.addEventListener('mousemove', e => {
  if (!drag || !stream) return;
  const rect = previewCanvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  // Show live drag rect on canvas (will be redrawn by preview loop)
  const f = scaleFactor();
  const x1 = Math.min(drag.startX, cx);
  const y1 = Math.min(drag.startY, cy);
  const x2 = Math.max(drag.startX, cx);
  const y2 = Math.max(drag.startY, cy);

  // Temporarily store as preview coords; converted on mouseup
  region = {
    x: f.toVideoX(x1),
    y: f.toVideoY(y1),
    w: (x2 - x1) / f.sx,
    h: (y2 - y1) / f.sy,
  };
});

previewCanvas.addEventListener('mouseup', e => {
  if (!drag) return;
  drag = null;

  if (!region || region.w < 10 || region.h < 10) {
    region = null;
    setStatus('yellow', '框選太小，請重新拖曳');
    return;
  }

  // Clamp to video bounds
  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  region.x = Math.max(0, Math.min(region.x, vw));
  region.y = Math.max(0, Math.min(region.y, vh));
  region.w = Math.min(region.w, vw - region.x);
  region.h = Math.min(region.h, vh - region.y);

  toggleBtn.disabled = false;
  const rw = Math.round(region.w), rh = Math.round(region.h);
  setStatus('yellow', `已選取 ${rw}×${rh}，按「開始」追蹤`);
  previewLabel.textContent = `已選取 ${rw}×${rh} 區域（可重新拖曳調整）`;
});

// ── Stop share ────────────────────────────────────────────────────────────────
stopShareBtn.addEventListener('click', () => {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  stopTracking();
  toggleBtn.disabled = true;
  stopShareBtn.disabled = true;
  region = null;
  setStatus('', '畫面擷取已停止');
});

// ── Start / Stop ───────────────────────────────────────────────────────────────
toggleBtn.addEventListener('click', () => {
  if (isRunning) stopTracking();
  else           startTracking();
});

async function startTracking() {
  if (!region) { setStatus('yellow', '請先在預覽上框選區域'); return; }

  setStatus('yellow', '初始化 OCR 引擎（首次需下載語言資料）…');
  toggleBtn.disabled = true;

  if (!worker) {
    worker = await Tesseract.createWorker('chi_tra+eng', 1, {
      logger: m => {
        if (m.status === 'loading tesseract core' ||
            m.status === 'loading language traineddata') {
          progressFill.style.width = Math.round((m.progress || 0) * 100) + '%';
        }
      }
    });
    await worker.setParameters({ tessedit_pageseg_mode: Tesseract.PSM.SPARSE_TEXT });
    progressFill.style.width = '0%';
  }

  isRunning = true;
  ocrBusy   = false;
  prevSample = null;
  firstDetection = true;
  toggleBtn.textContent = '停止';
  toggleBtn.classList.add('stop');
  toggleBtn.disabled = false;
  setStatus('green', '追蹤中…');

  startMotionPoll();
}

function stopTracking() {
  isRunning = false;
  clearTimeout(motionTimer);
  toggleBtn.textContent = '開始';
  toggleBtn.classList.remove('stop');
  earlyDetectBtn.disabled = true;
  stopCountdown();
  setStatus('', '已停止');
}

// ── Motion poll: triggers OCR when the selected region changes visibly ─────────
let prevSample = null;

let firstDetection = true; // resets when tracking starts

const earlyDetectBtn  = document.getElementById('earlyDetectBtn');
const countdownText   = document.getElementById('countdownText');
let countdownInterval = null;

function startCountdown(seconds) {
  clearInterval(countdownInterval);
  clearTimeout(alertTimer);
  clearTimeout(alertHideTimer);
  countdownText.style.display = 'inline';
  let remaining = seconds;

  // Show popup when 10 seconds remain
  alertTimer = setTimeout(() => {
    snowAlert.classList.add('show');
    alertHideTimer = setTimeout(closeAlert, 10000);
  }, (seconds - 10) * 1000);

  function update() {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    countdownText.textContent = `下次偵測 ${m}:${s}`;
    if (remaining <= 0) stopCountdown();
    else remaining--;
  }

  update();
  countdownInterval = setInterval(update, 1000);
}

function stopCountdown() {
  clearInterval(countdownInterval);
  countdownText.style.display = 'none';
  // Cancel any pending alert when countdown is cleared
  clearTimeout(alertTimer);
  clearTimeout(alertHideTimer);
  closeAlert();
}

earlyDetectBtn.addEventListener('click', async () => {
  if (ocrBusy || !isRunning) return;
  // Cancel the 10-min wait and trigger OCR immediately
  clearTimeout(motionTimer);
  stopCountdown();
  earlyDetectBtn.disabled = true;
  ocrBusy = true;
  await runOCR();
  ocrBusy = false;
  // Reset: back to 1 s polling (firstDetection already false, so next record → 10 min wait)
  startMotionPoll();
});

function setWaiting(waiting) {
  earlyDetectBtn.disabled = !waiting;
  if (waiting) {
    startCountdown(10 * 60);
  } else {
    stopCountdown(); // also cancels alert inside
  }
}

function startMotionPoll() {
  setWaiting(false);
  if (!isRunning) return;
  motionTimer = setTimeout(async () => {
    if (!ocrBusy && isRunning) {
      ocrBusy = true;
      const recorded = await runOCR();
      ocrBusy = false;
      if (recorded) {
        firstDetection = false;
        // After every record, wait 10 minutes then resume polling
        setWaiting(true);
        if (isRunning) motionTimer = setTimeout(startMotionPoll, 10 * 60 * 1000);
        return;
      }
    }
    startMotionPoll();
  }, 1000);
}

// Off-screen canvas for OCR
const offCanvas = document.createElement('canvas');
const offCtx    = offCanvas.getContext('2d', { willReadFrequently: true });

// Check whether the selected region has changed enough to warrant OCR
function regionChanged() {
  if (!stream || !region) return false;
  const { x, y, w, h } = region;
  if (w < 1 || h < 1) return false;

  const rw = Math.round(w), rh = Math.round(h);
  offCanvas.width  = rw;
  offCanvas.height = rh;
  offCtx.drawImage(videoEl, Math.round(x), Math.round(y), rw, rh, 0, 0, rw, rh);

  const data = offCtx.getImageData(0, 0, rw, rh).data;
  const STEP = 10, THRESH = 30, MIN_RATIO = 0.04;
  const curr = [];

  for (let py = 0; py < rh; py += STEP)
    for (let px = 0; px < rw; px += STEP) {
      const i = (py * rw + px) * 4;
      curr.push(data[i], data[i + 1], data[i + 2]);
    }

  if (!prevSample || prevSample.length !== curr.length) { prevSample = curr; return true; }

  let diff = 0;
  const total = curr.length / 3;
  for (let i = 0; i < curr.length; i += 3)
    if (Math.abs(curr[i]   - prevSample[i])   > THRESH ||
        Math.abs(curr[i+1] - prevSample[i+1]) > THRESH ||
        Math.abs(curr[i+2] - prevSample[i+2]) > THRESH) diff++;

  prevSample = curr;
  return diff / total >= MIN_RATIO;
}

// ── OCR on selected region ─────────────────────────────────────────────────────
async function runOCR() {
  if (!stream || !region) return;
  const { x, y, w, h } = region;

  offCanvas.width  = Math.round(w);
  offCanvas.height = Math.round(h);
  offCtx.drawImage(videoEl, Math.round(x), Math.round(y), Math.round(w), Math.round(h),
                            0, 0, Math.round(w), Math.round(h));

  // Grayscale + contrast boost
  const id = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    const v = Math.min(255, Math.max(0, (g - 128) * 1.8 + 128));
    d[i] = d[i+1] = d[i+2] = v;
  }
  offCtx.putImageData(id, 0, 0);

  // Scale up 2x — improves Tesseract accuracy on small / stylised game fonts
  const scaled   = document.createElement('canvas');
  scaled.width   = offCanvas.width  * 2;
  scaled.height  = offCanvas.height * 2;
  const sCtx     = scaled.getContext('2d');
  sCtx.imageSmoothingEnabled = false;
  sCtx.drawImage(offCanvas, 0, 0, scaled.width, scaled.height);

  try {
    const { data: { text } } = await worker.recognize(scaled);
    console.log(`[OCR] ${new Date().toTimeString().slice(0,8)}\n${text}`);
    return parseText(text);
  } catch (err) {
    console.error('[OCR] error:', err);
    return false;
  }
}

// ── Name roster ───────────────────────────────────────────────────────────────
const rosterModal    = document.getElementById('rosterModal');
const rosterInput    = document.getElementById('rosterInput');
const rosterList     = document.getElementById('rosterList');
const rosterAddBtn   = document.getElementById('rosterAddBtn');
const rosterCloseBtn = document.getElementById('rosterCloseBtn');

document.getElementById('nameListBtn').addEventListener('click', () => {
  rosterModal.classList.add('open');
  rosterInput.focus();
});
rosterCloseBtn.addEventListener('click', () => rosterModal.classList.remove('open'));
rosterModal.addEventListener('click', e => { if (e.target === rosterModal) rosterModal.classList.remove('open'); });

// Roster data: [{ name }]
const roster = [];
let editingIndex = null;

rosterAddBtn.addEventListener('click', commitRoster);
rosterInput.addEventListener('keydown', e => { if (e.key === 'Enter') commitRoster(); });

function commitRoster() {
  const name = rosterInput.value.trim();
  if (!name) return;

  if (editingIndex !== null) {
    roster[editingIndex].name = name;
    editingIndex = null;
    rosterAddBtn.textContent = '新增';
  } else {
    if (roster.some(r => r.name === name)) { rosterInput.value = ''; return; } // no duplicate
    roster.push({ name });
  }

  rosterInput.value = '';
  renderRoster();
}

function renderRoster() {
  if (roster.length === 0) {
    rosterList.innerHTML = '<div class="roster-empty">尚無名稱</div>';
    return;
  }
  rosterList.innerHTML = '';
  roster.forEach((r, i) => {
    const minMatch = Math.max(1, Math.floor(r.name.length / 2));
    const div = document.createElement('div');
    div.className = 'roster-item';
    div.innerHTML = `
      <span class="roster-item-name">${escHtml(r.name)}</span>
      <span class="roster-item-hint">對 ${minMatch} 字</span>
      <button class="roster-btn edit" data-i="${i}">編輯</button>
      <button class="roster-btn del"  data-i="${i}">刪除</button>
    `;
    rosterList.appendChild(div);
  });

  rosterList.querySelectorAll('.roster-btn.edit').forEach(btn => {
    btn.addEventListener('click', () => {
      editingIndex = +btn.dataset.i;
      rosterInput.value = roster[editingIndex].name;
      rosterAddBtn.textContent = '儲存';
      rosterInput.focus();
    });
  });

  rosterList.querySelectorAll('.roster-btn.del').forEach(btn => {
    btn.addEventListener('click', () => {
      roster.splice(+btn.dataset.i, 1);
      if (editingIndex !== null) { editingIndex = null; rosterAddBtn.textContent = '新增'; rosterInput.value = ''; }
      renderRoster();
    });
  });
}

// Match OCR text against roster.
// Returns the full name from roster if at least floor(name.length/2) consecutive
// characters (case-insensitive) are found in the OCR string, otherwise null.
function matchRoster(ocrName) {
  for (const r of roster) {
    const need = Math.max(1, Math.floor(r.name.length / 2));
    // Try every consecutive substring of length `need` from the roster name (case-sensitive)
    for (let start = 0; start <= r.name.length - need; start++) {
      const sub = r.name.slice(start, start + need);
      if (ocrName.includes(sub)) return r.name;
    }
  }
  return null;
}

// ── Parse OCR text ─────────────────────────────────────────────────────────────
function parseText(raw) {
  // Remove spaces inserted between adjacent CJK characters by Tesseract
  let cleaned = raw;
  for (let i = 0; i < 4; i++)
    cleaned = cleaned.replace(/([\u4e00-\u9fff])\s+([\u4e00-\u9fff])/g, '$1$2');

  let finalName = null;

  if (roster.length > 0) {
    // Roster set → always use roster matching logic
    finalName = matchRoster(cleaned);
    if (!finalName) return false;
  } else {
    // No roster → use colon logic
    const colonMatch = cleaned.match(/(.+?)[：:]/);
    if (!colonMatch) return false;
    finalName = colonMatch[1].trim() || null;
    if (!finalName) return false;
  }

  addItem(finalName);
  return true;
}

// ── Snowflake ending reminder (9 min after last record) ───────────────────────
const snowAlert    = document.getElementById('snowAlert');
let alertTimer     = null;
let alertHideTimer = null;

function scheduleAlert() {
  clearTimeout(alertTimer);
  clearTimeout(alertHideTimer);
  alertTimer = setTimeout(() => {
    snowAlert.classList.add('show');
    // Auto-close after 10 s
    alertHideTimer = setTimeout(closeAlert, 10000);
  }, 9 * 60 * 1000 + 50 * 1000);
}

function closeAlert() {
  clearTimeout(alertHideTimer);
  snowAlert.classList.remove('show');
}

document.getElementById('alertOkBtn').addEventListener('click', closeAlert);

// ── Add name to list ───────────────────────────────────────────────────────────
function addItem(name) {
  const time = new Date().toTimeString().slice(0, 8);
  items.push({ name, time });

  if (nameList.querySelector('.empty-hint')) nameList.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'name-item';
  div.innerHTML = `
    <span class="item-idx">${items.length}</span>
    <span class="item-name">${escHtml(name)}</span>
    <span class="item-time">${time}</span>
  `;
  nameList.appendChild(div);
  nameList.scrollTop = nameList.scrollHeight;
  countBadge.textContent = items.length + ' 筆';

  // Reset the 9-minute countdown every time a record is written
  scheduleAlert();
}

// ── Clear ──────────────────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  items.length = 0;
  recentNames.clear();
  prevSample = null;
  nameList.innerHTML = '<div class="empty-hint">尚無紀錄</div>';
  countBadge.textContent = '0 筆';
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(type, msg) {
  statusDot.className = 'dot' + (type ? ' ' + type : '');
  statusText.textContent = msg;
}
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
